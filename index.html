<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manushi Beauty Parlour & Academy | Luxury Salon · Siwan, Bihar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --pink:       #e91e8c;
  --pink-deep:  #c2185b;
  --pink-soft:  #ff6bb5;
  --pink-pale:  #fce4ec;
  --gold:       #d4af37;
  --gold-light: #f0d060;
  --gold-pale:  #fff8dc;
  --black:      #0a0506;
  --dark:       #140a0f;
  --dark2:      #1e0d16;
  --charcoal:   #2a1520;
  --white:      #fffcfe;
  --text-muted: rgba(255,220,235,0.65);
  --shadow-pink: 0 0 40px rgba(233,30,140,0.35);
  --shadow-gold: 0 0 40px rgba(212,175,55,0.3);
  --trans:       all 0.45s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Poppins',sans-serif;
  background:var(--black);
  color:var(--white);
  overflow-x:hidden;
}
img { display:block; }
a { text-decoration:none; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:#0a0506; }
::-webkit-scrollbar-thumb { background:linear-gradient(var(--pink),var(--gold)); border-radius:4px; }

#particles-canvas {
  position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.45;
}

#navbar {
  position:fixed; top:0; width:100%; z-index:1000;
  padding:20px 60px;
  display:flex; align-items:center; justify-content:space-between;
  transition:var(--trans);
}
#navbar.scrolled {
  background:rgba(10,5,6,0.95);
  backdrop-filter:blur(20px);
  padding:12px 60px;
  border-bottom:1px solid rgba(212,175,55,0.2);
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.nav-logo-wrap { display:flex; align-items:center; gap:14px; }
.nav-logo-img {
  width:52px; height:52px; border-radius:50%;
  border:2px solid var(--gold);
  object-fit:cover;
  box-shadow:0 0 16px rgba(212,175,55,0.4);
}
.nav-brand-name {
  font-family:'Playfair Display',serif;
  font-size:1rem; font-weight:700;
  color:var(--gold); line-height:1.2;
}
.nav-brand-sub {
  font-size:0.58rem; letter-spacing:0.22em;
  text-transform:uppercase; color:rgba(255,182,218,0.7);
  font-weight:400;
}
.nav-links { display:flex; align-items:center; gap:38px; list-style:none; }
.nav-links a {
  font-size:0.72rem; font-weight:500;
  letter-spacing:0.16em; text-transform:uppercase;
  color:rgba(255,220,235,0.8);
  position:relative; transition:color 0.3s;
}
.nav-links a::after {
  content:''; position:absolute; bottom:-4px; left:0;
  width:0; height:1px;
  background:linear-gradient(90deg,var(--pink),var(--gold));
  transition:width 0.3s;
}
.nav-links a:hover { color:var(--gold); }
.nav-links a:hover::after { width:100%; }
.nav-book-btn {
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  color:white !important; padding:10px 26px; border-radius:30px;
  font-size:0.68rem !important; font-weight:600 !important;
  letter-spacing:0.14em !important;
  box-shadow:0 4px 20px rgba(233,30,140,0.4);
  transition:var(--trans) !important;
}
.nav-book-btn:hover {
  transform:translateY(-2px) !important;
  box-shadow:0 8px 30px rgba(233,30,140,0.6) !important;
}
.nav-book-btn::after { display:none !important; }

  position:relative; height:100vh; min-height:700px;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; text-align:center;
}

@keyframes heroZoom { from{transform:scale(1.08);} to{transform:scale(1.18);} }
.hero-overlay {
  position:absolute; inset:0; z-index:2;
  background:linear-gradient(180deg,rgba(10,5,6,0.55) 0%,rgba(20,10,15,0.75) 40%,rgba(10,5,6,0.92) 100%);
}
.hero-glow-orb {
  position:absolute; z-index:2; border-radius:50%;
  animation:orbPulse 5s ease-in-out infinite; pointer-events:none;
}
.hero-glow-orb.orb1 {
  width:500px; height:500px;
  background:radial-gradient(circle,rgba(233,30,140,0.18) 0%,transparent 70%);
  top:-100px; left:-100px;
}
.hero-glow-orb.orb2 {
  width:400px; height:400px;
  background:radial-gradient(circle,rgba(212,175,55,0.12) 0%,transparent 70%);
  bottom:-80px; right:-80px; animation-delay:2.5s;
}
@keyframes orbPulse {
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.15);opacity:0.7;}
}
.hero-content {
  position:relative; z-index:3;
  display:flex; flex-direction:column; align-items:center; padding:0 24px;
}
.hero-logo-ring {
  width:140px; height:140px; border-radius:50%;
  border:2px solid rgba(212,175,55,0.6);
  padding:6px; margin-bottom:28px; position:relative;
  animation:logoPulse 3s ease-in-out infinite;
  box-shadow:0 0 30px rgba(212,175,55,0.3),0 0 80px rgba(233,30,140,0.2);
}
.hero-logo-ring::before {
  content:''; position:absolute; inset:-6px; border-radius:50%;
  border:1px solid rgba(212,175,55,0.25);
  animation:spinRing 10s linear infinite;
}
.hero-logo-ring::after {
  content:''; position:absolute; inset:-14px; border-radius:50%;
  border:1px dashed rgba(233,30,140,0.2);
  animation:spinRing 16s linear infinite reverse;
}
@keyframes logoPulse {
  0%,100%{box-shadow:0 0 30px rgba(212,175,55,0.3),0 0 80px rgba(233,30,140,0.2);}
  50%{box-shadow:0 0 50px rgba(212,175,55,0.5),0 0 120px rgba(233,30,140,0.35);}
}
@keyframes spinRing { to{transform:rotate(360deg);} }

/* ══════════════════════════════════════════════
   PREMIUM MAP SECTION — CSS
══════════════════════════════════════════════ */

/* Section wrapper */
.map-section-wrap {
  position: relative;
  background: linear-gradient(
    160deg,
    #070305 0%,
    #120810 30%,
    #0e060c 55%,
    #160b12 80%,
    #070305 100%
  );
  padding: 120px 60px 140px;
  overflow: hidden;
  z-index: 1;
}

/* Background glow orbs */
.map-bg-orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(80px);
  opacity: 0.55;
}
.map-orb1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(233,30,140,0.22) 0%, transparent 70%);
  top: -180px; left: -160px;
  animation: orbDrift1 10s ease-in-out infinite alternate;
}
.map-orb2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(212,175,55,0.16) 0%, transparent 70%);
  bottom: -150px; right: -120px;
  animation: orbDrift2 13s ease-in-out infinite alternate;
}
.map-orb3 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(233,30,140,0.1) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: orbDrift3 8s ease-in-out infinite alternate;
}
@keyframes orbDrift1 { from{transform:translate(0,0);} to{transform:translate(40px,30px);} }
@keyframes orbDrift2 { from{transform:translate(0,0);} to{transform:translate(-30px,-40px);} }
@keyframes orbDrift3 { from{transform:translate(-50%,-50%) scale(1);} to{transform:translate(-50%,-50%) scale(1.2);} }

/* Inner max-width container */
.map-section-inner {
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

/* Header */
.map-section-header {
  text-align: center;
  margin-bottom: 60px;
}
.map-eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 18px;
}
.eyebrow-line {
  flex: 1;
  max-width: 70px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.7));
}
.map-eyebrow .eyebrow-line:last-child {
  background: linear-gradient(90deg, rgba(212,175,55,0.7), transparent);
}
.eyebrow-text {
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #d4af37;
}
.map-section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4.5vw, 3.4rem);
  font-weight: 800;
  color: #fffcfe;
  line-height: 1.12;
  margin-bottom: 14px;
}
.map-section-title em {
  font-style: italic;
  background: linear-gradient(135deg, #ff6bb5, #e91e8c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.map-section-subtitle {
  color: rgba(255,220,235,0.6);
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  font-weight: 300;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.8;
}

/* ── MAP CARD ── */
.map-card {
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  background: linear-gradient(145deg, rgba(255,255,255,0.045), rgba(255,255,255,0.01));
  border: 1px solid rgba(233,30,140,0.25);
  box-shadow:
    0 0 0 1px rgba(212,175,55,0.1),
    0 30px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(233,30,140,0.08);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1),
              box-shadow 0.6s cubic-bezier(0.4,0,0.2,1);
}
.map-card:hover {
  transform: translateY(-8px) scale(1.008);
  box-shadow:
    0 0 0 1px rgba(212,175,55,0.2),
    0 50px 100px rgba(0,0,0,0.7),
    0 0 100px rgba(233,30,140,0.18),
    0 0 60px rgba(212,175,55,0.1);
}

/* Glowing animated border ring */
.map-glow-ring {
  position: absolute;
  inset: 0;
  border-radius: 28px;
  z-index: 0;
  pointer-events: none;
  padding: 1.5px;
  background: linear-gradient(
    135deg,
    rgba(233,30,140,0) 0%,
    rgba(233,30,140,0.8) 25%,
    rgba(212,175,55,0.9) 50%,
    rgba(233,30,140,0.8) 75%,
    rgba(233,30,140,0) 100%
  );
  background-size: 300% 300%;
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: ringGlow 4s linear infinite;
  opacity: 0.7;
}
.map-card:hover .map-glow-ring { opacity: 1; animation-duration: 2.5s; }
@keyframes ringGlow {
  0%   { background-position: 0%   50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0%   50%; }
}

/* ── INFO STRIP ── */
.map-info-strip {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 18px 28px;
  background: rgba(10,5,6,0.85);
  border-bottom: 1px solid rgba(212,175,55,0.15);
}
.map-info-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 50px;
  padding: 7px 18px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.72rem;
  font-weight: 400;
  color: rgba(255,220,235,0.85);
  transition: all 0.3s;
  white-space: nowrap;
}
.map-info-chip:hover {
  background: rgba(233,30,140,0.12);
  border-color: rgba(233,30,140,0.4);
  color: #fff;
}
.chip-icon { font-size: 0.9rem; }

/* ── MAP IFRAME WRAPPER ── */
.map-iframe-wrap {
  position: relative;
  z-index: 2;
  height: 420px;
  overflow: hidden;
  transition: height 0.4s ease;
}
.map-iframe-wrap iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1),
              filter 0.6s ease;
  filter: saturate(0.7) brightness(0.85) contrast(1.1);
}
.map-card:hover .map-iframe-wrap iframe {
  transform: scale(1.03);
  filter: saturate(1) brightness(0.95) contrast(1.05);
}

/* Shimmer overlay on load */
.map-overlay-shimmer {
  position: absolute;
  inset: 0;
  z-index: 3;
  background: linear-gradient(
    120deg,
    rgba(10,5,6,0) 0%,
    rgba(212,175,55,0.06) 50%,
    rgba(10,5,6,0) 100%
  );
  background-size: 200% 100%;
  animation: shimmerSlide 3s ease-in-out infinite;
  pointer-events: none;
  opacity: 0.6;
}
.map-card:hover .map-overlay-shimmer { animation-play-state: paused; opacity: 0; }
@keyframes shimmerSlide {
  0%   { background-position: -100% 0; }
  100% { background-position: 200% 0; }
}

/* ── ACTION BAR ── */
.map-action-bar {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 24px 32px;
  background: rgba(10,5,6,0.92);
  border-top: 1px solid rgba(212,175,55,0.12);
  flex-wrap: wrap;
}
.map-address-block {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  min-width: 200px;
}
.map-address-icon {
  font-size: 1.4rem;
  flex-shrink: 0;
}
.map-address-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.map-addr-label {
  font-family: 'Poppins', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #d4af37;
  font-weight: 600;
}
.map-addr-val {
  font-family: 'Poppins', sans-serif;
  font-size: 0.8rem;
  color: rgba(255,220,235,0.7);
  font-weight: 300;
  line-height: 1.5;
}

/* ── BUTTONS ── */
.map-btn-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.map-directions-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 26px;
  border-radius: 50px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.76rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  white-space: nowrap;
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}
.map-directions-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.map-directions-btn:hover::before { opacity: 1; }

/* Primary — Get Directions */
.primary-directions {
  background: linear-gradient(135deg, #e91e8c, #c2185b);
  color: white;
  box-shadow:
    0 6px 24px rgba(233,30,140,0.4),
    0 0 0 1px rgba(233,30,140,0.3);
}
.primary-directions:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow:
    0 14px 40px rgba(233,30,140,0.6),
    0 0 0 1px rgba(233,30,140,0.5),
    0 0 60px rgba(233,30,140,0.25);
}
.primary-directions .btn-arrow {
  display: inline-block;
  transition: transform 0.3s;
}
.primary-directions:hover .btn-arrow { transform: translateX(4px); }

/* Secondary — WhatsApp */
.secondary-directions {
  background: transparent;
  color: #d4af37;
  border: 1.5px solid rgba(212,175,55,0.5);
}
.secondary-directions:hover {
  background: rgba(212,175,55,0.1);
  border-color: #d4af37;
  transform: translateY(-3px);
  box-shadow:
    0 10px 30px rgba(212,175,55,0.2),
    0 0 40px rgba(212,175,55,0.1);
}

/* ══════════════════════════════════════════════
   RESPONSIVE — MAP
══════════════════════════════════════════════ */
@media (max-width: 768px) {
  .map-section-wrap { padding: 80px 20px 100px; }
  .map-info-strip { gap: 8px; padding: 14px 16px; }
  .map-info-chip { font-size: 0.65rem; padding: 6px 12px; }
  .map-iframe-wrap { height: 280px; }
  .map-action-bar {
    flex-direction: column;
    align-items: flex-start;

  }
  .map-btn-group { width: 100%; }
  .map-directions-btn { flex: 1; justify-content: center; font-size: 0.7rem; padding: 11px 18px; }
}
@media (max-width: 480px) {
  .map-info-strip { flex-direction: column; align-items: flex-start; }
  .map-btn-group { flex-direction: column; }
}
